identity:
  name: "add_data"
  author: "cognee_team"
  label:
    en_US: "Add Data"
    zh_Hans: "添加数据"
    pt_BR: "Adicionar Dados"
    ja_JP: "データ追加"
description:
  human:
    en_US: "Add text data to a Cognee dataset for knowledge graph processing"
    zh_Hans: "向 Cognee 数据集添加文本数据以进行知识图谱处理"
    pt_BR: "Adicionar dados de texto a um dataset Cognee para processamento de grafo de conhecimento"
    ja_JP: "ナレッジグラフ処理のために Cognee データセットにテキストデータを追加"
  llm: "Add text data to a Cognee dataset. Use this to ingest text content into a named dataset before running cognify to build the knowledge graph."
parameters:
  - name: dataset_name
    type: string
    required: true
    label:
      en_US: "Dataset Name"
      zh_Hans: "数据集名称"
      pt_BR: "Nome do Dataset"
      ja_JP: "データセット名"
    human_description:
      en_US: "Name of the target dataset to add data to"
      zh_Hans: "要添加数据的目标数据集名称"
      pt_BR: "Nome do dataset de destino para adicionar dados"
      ja_JP: "データを追加する対象データセット名"
    llm_description: "The name of the dataset to add the text data to"
    form: llm
  - name: text_data
    type: string
    required: true
    label:
      en_US: "Text Data"
      zh_Hans: "文本数据"
      pt_BR: "Dados de Texto"
      ja_JP: "テキストデータ"
    human_description:
      en_US: "Text content to add to the dataset"
      zh_Hans: "要添加到数据集的文本内容"
      pt_BR: "Conteúdo de texto para adicionar ao dataset"
      ja_JP: "データセットに追加するテキスト内容"
    llm_description: "The text content to add to the dataset. Multiple items can be separated by newlines."
    form: llm
output_schema:
  type: object
  properties:
    dataset_name:
      type: string
      description: "The dataset name that data was added to"
    dataset_id:
      type: string
      description: "The UUID of the dataset"
    data_id:
      type: string
      description: "UUID of the first added data item – use with Delete Data to remove it"
    items_count:
      type: number
      description: "Number of text items added"
extra:
  python:
    source: tools/add_data.py
